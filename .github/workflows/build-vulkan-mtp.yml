name: Build llama.cpp Vulkan + MTP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout MTP branch
        uses: actions/checkout@v4
        with:
          repository: am17an/llama.cpp
          ref: mtp-clean
          fetch-depth: 0

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "1.4.313.2"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/vulkansdk-windows-X64-$version.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\VulkanSDK.exe"
          & "$env:RUNNER_TEMP\VulkanSDK.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\$version"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\$version\bin"

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON -DGGML_VULKAN=ON 

      - name: Build
        run: cmake --build build --config Release --target llama-server -j4
        
      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Path build -Include *.exe, *.dll

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: llama-vulkan-mtp-windows
          path: |
            build/bin/Release/llama-server.exe
            build/bin/Release/*.dll
