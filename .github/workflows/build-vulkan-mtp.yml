name: Build llama.cpp Vulkan + MTP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout MTP branch
        uses: actions/checkout@v4
        with:
          repository: am17an/llama.cpp
          ref: mtp-clean
          fetch-depth: 0

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "1.3.296.0"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = (Get-ChildItem "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Configure
        run: |
          cmake -B build -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: llama-vulkan-mtp-windows
          path: |
            build/bin/*.exe
            build/bin/*.dll

      
